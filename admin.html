<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣小學大戰 - GM 創世神主控台 v2.2</title>
    <style>
        body { font-family: sans-serif; background-color: #111827; color: #f3f4f6; padding: 20px; text-align: center; }
        .container { max-width: 650px; margin: 0 auto; background: #1f2937; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #374151; }
        h1 { color: #f59e0b; font-size: 28px; margin-bottom: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .subtitle { color: #9ca3af; font-size: 14px; margin-bottom: 25px; letter-spacing: 1px; }
        .section { border: 1px solid #4b5563; background: #111827; border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: left; }
        .section h3 { margin-top: 0; color: #3b82f6; border-bottom: 2px solid #2563eb; padding-bottom: 8px; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        button { background: #ef4444; color: white; border: none; padding: 12px 18px; font-weight: bold; border-radius: 8px; cursor: pointer; margin: 5px 2px; transition: all 0.2s; font-size: 14px; }
        button:hover { background: #dc2626; transform: translateY(-1px); }
        .btn-green { background: #10b981; }
        .btn-green:hover { background: #059669; }
        .btn-blue { background: #3b82f6; }
        .btn-blue:hover { background: #2563eb; }
        .btn-purple { background: #8b5cf6; }
        .btn-purple:hover { background: #7c3aed; }
        select, input { padding: 12px; border-radius: 8px; border: 1px solid #4b5563; margin: 8px 0; width: 100%; background: #1f2937; color: white; font-weight: bold; box-sizing: border-box; font-size: 15px; }
        select { color: #f59e0b; cursor: pointer; }
        .flex-row { display: flex; gap: 12px; align-items: center; }
        #admin-box { display: none; }
    </style>
    <!-- 引入 Firebase 核心套件 -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

    <div class="container">
        <h1>⚡ 3年2班 創世神主控台 <span style="font-size: 14px; color:#ef4444;">v2.2</span></h1>
        <div class="subtitle">最高權限角色：總管理員（網址修復版）</div>
        
        <!-- 🔐 密碼驗證區 -->
        <div id="auth-box">
            <p>請輸入管理員終極密碼：</p>
            <input type="password" id="gm-pass" placeholder="••••••••" style="text-align: center; letter-spacing: 4px;">
            <button class="btn-green" onclick="verifyGM()" style="width: 100%; margin-top: 10px; font-size: 16px;">解鎖神力控制台</button>
        </div>

        <!-- 🎛️ 核心控制區 -->
        <div id="admin-box">
            
            <!-- 1. 時間與秩序 -->
            <div class="section">
                <h3>🕒 時間與鐘聲控制</h3>
                <div class="flex-row">
                    <button class="btn-green" onclick="changeMode('上課')" style="flex: 1;">👨‍🏫 強制切換【上課】</button>
                    <button class="btn-green" onclick="changeMode('下課')" style="flex: 1;">🏃‍♂️ 強制切換【下課】</button>
                </div>
            </div>

            <!-- 2. 全自動玩家物資控制面板 -->
            <div class="section">
                <h3>🎁 智慧玩家物資更改面板</h3>
                <label style="font-size: 13px; color: #9ca3af;">🎯 第一步：選擇目標玩家</label>
                
                <div class="flex-row" style="margin-bottom: 5px;">
                    <select id="player-select" style="flex: 4;">
                        <option value="">-- 請輸入密碼解鎖名單 --</option>
                    </select>
                    <button class="btn-green" id="refresh-btn" onclick="loadPlayerList()" style="flex: 1.5; margin: 0; padding: 10px; font-size: 12px; display: none;">🔄 刷新名單</button>
                </div>

                <label style="font-size: 13px; color: #9ca3af; margin-top: 10px; display: block;">💰 第二步：設定更改數量</label>
                <input type="number" id="stat-amount" value="1000" placeholder="請輸入數量">

                <label style="font-size: 13px; color: #9ca3af; margin-top: 10px; display: block;">⚡ 第三步：選擇執行動作（支援不斷累加）</label>
                <div class="flex-row" style="margin-top: 5px;">
                    <button class="btn-blue" onclick="modifyStat('snack', 'add')" style="flex: 1;">🍪 零食 往上加 (+)</button>
                    <button class="btn-purple" onclick="modifyStat('snack', 'set')" style="flex: 1;">🎯 零食 直接設 (=)</button>
                </div>
                <div class="flex-row" style="margin-top: 5px;">
                    <button class="btn-blue" onclick="modifyStat('ap', 'add')" style="flex: 1;">⚡ AP 往上加 (+)</button>
                    <button class="btn-purple" onclick="modifyStat('ap', 'set')" style="flex: 1;">🎯 AP 直接設 (=)</button>
                </div>
                <button onclick="resetPlayer()" style="width: 100%; background: #4b5563; margin-top: 12px; color: #f3f4f6;">🗑️ 沒收財產 (歸零該玩家數值)</button>
            </div>

            <!-- 3. 全服公告 -->
            <div class="section">
                <h3>📢 創世神降臨廣播</h3>
                <input type="text" id="broadcast-msg" placeholder="輸入你想對全校公告的話...">
                <button class="btn-green" onclick="sendBroadcast()" style="width: 100%;">⚡ 發送全服跑馬燈</button>
            </div>

            <!-- 4. 領土與秩序 -->
            <div class="section">
                <h3>💣 天罰與秩序系統</h3>
                <input type="text" id="tile-coord" placeholder="輸入地圖座標 (例如: 12_15)">
                <div class="flex-row">
                    <button onclick="wipeTile()" style="flex: 1;">💥 炸毀此格子</button>
                    <button onclick="clearChat()" style="flex: 1; background: #6b7280;">🧹 擦黑板 (清空聊天)</button>
                </div>
                <button onclick="wipeAllMap()" style="background: #962d22; width: 100%; margin-top: 10px;">🔥 毀天滅地 (清空全地圖)</button>
            </div>

            <!-- 5. 黑名單系統 -->
            <div class="section">
                <h3>🚫 惡魔島 (黑名單系統)</h3>
                <input type="text" id="ban-player" placeholder="輸入要封鎖的作弊玩家暱稱">
                <button onclick="banUser()" style="width: 100%;">🔒 限制登入 (Ban)</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🛠️ 【重要！請在這裡填入你的 Firebase 網址】
        // ==========================================
        const firebaseConfig = {
            databaseURL: "https://taiwan-school-war-default-rtdb.europe-west1.firebasedatabase.app/server_time"
        };
        // ==========================================

        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 登入驗證
        function verifyGM() {
            const input = document.getElementById('gm-pass').value;
            if (input === "admin321") {
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('admin-box').style.display = 'block';
                document.getElementById('refresh-btn').style.display = 'block';
                
                // 登入成功，立刻強制抓取雲端名單
                loadPlayerList();
            } else {
                alert("❌ 密碼錯誤！");
            }
        }

        // 強制拉取 Firebase 玩家節點（專治無痕模式與各種卡死）
        function loadPlayerList() {
            const select = document.getElementById('player-select');
            if (!select) return;

            select.innerHTML = '<option value="">⏳ 正在強力讀取雲端名單...</option>'; 

            db.ref('users').once('value').then((snapshot) => {
                select.innerHTML = '<option value="">-- 請選擇在線玩家 --</option>'; 
                
                if (snapshot.exists()) {
                    let hasPlayers = false;
                    snapshot.forEach((childSnapshot) => {
                        const playerName = childSnapshot.key;
                        if (playerName) {
                            const option = document.createElement('option');
                            option.value = playerName;
                            option.textContent = `👤 ${playerName}`;
                            select.appendChild(option);
                            hasPlayers = true;
                        }
                    });
                    if (!hasPlayers) {
                        select.innerHTML = '<option value="">❌ 雲端結構中無有效玩家</option>';
                    }
                } else {
                    select.innerHTML = '<option value="">❌ 雲端目前沒有任何玩家資料</option>';
                }
            }).catch((error) => {
                console.error("讀取失敗:", error);
                select.innerHTML = '<option value="">❌ 讀取失敗，請確認 Firebase 規則</option>';
            });
        }

        // 1. 修改時間
        function changeMode(targetMode) {
            db.ref('server_time').set({ mode: targetMode, timeLeft: targetMode === "下課" ? 50 : 40, hostId: "GM_CONTROLLER" });
            alert(`已切換為【${targetMode}】`);
        }

        // 2. 物資控制核心（支援累加與覆蓋）
        function modifyStat(type, method) {
            const select = document.getElementById('player-select');
            const player = select ? select.value : '';
            const amountInput = document.getElementById('stat-amount').value;
            
            if(!player) { alert("❌ 請先在下拉選單選取一名玩家！"); return; }
            if(!amountInput || isNaN(amountInput)) { alert("❌ 請輸入有效的更改數量！"); return; }
            
            const val = Number(amountInput);

            if (method === 'set') {
                db.ref('users/' + player + '/' + type).set(val);
                alert(`🧙‍♂️ 神蹟顯靈！已將 ${player} 的 ${type.toUpperCase()} 直接覆蓋設定為 ${val}！`);
            } else if (method === 'add') {
                db.ref('users/' + player + '/' + type).once('value').then((snapshot) => {
                    const current = Number(snapshot.val()) || 0;
                    const total = current + val;
                    db.ref('users/' + player + '/' + type).set(total);
                    alert(`🧙‍♂️ 神蹟顯靈！已幫 ${player} 的 ${type.toUpperCase()} 增加了 ${val}！(目前總共: ${total})`);
                }).catch((err) => {
                    alert("❌ 數據讀取失敗，請重試。");
                });
            }
        }

        // 歸零玩家
        function resetPlayer() {
            const player = document.getElementById('player-select').value;
            if(!player) { alert("❌ 請先選取玩家！"); return; }
            if(confirm(`確定要沒收 ${player} 的所有財產嗎？`)) {
                db.ref('users/' + player).set({ snack: 0, ap: 0, role: "未選擇" });
                alert(`${player} 已變成破產平民。`);
            }
        }

        // 3. 發送全服公告
        function sendBroadcast() {
            const msg = document.getElementById('broadcast-msg').value.trim();
            if(!msg) return;
            db.ref('chat').push({
                name: "📢 創世神旨意",
                text: "✨ " + msg + " ✨",
                color: "#f1c40f"
            });
            document.getElementById('broadcast-msg').value = "";
            alert("廣播已發送！");
        }

        // 4. 地圖與聊天
        function wipeTile() {
            const coord = document.getElementById('tile-coord').value.trim();
            if(!coord) return;
            db.ref('global_map/' + coord).remove();
            alert(`💥 座標 ${coord} 已夷為平地`);
        }
        function clearChat() {
            db.ref('chat').remove();
            db.ref('chat').push({ name: "系統", text: "🧹 值日生把黑板擦乾淨了。", color: "#2ecc71" });
            alert("黑板已擦乾淨！");
        }
        function wipeAllMap() {
            if(confirm("確定要重置全伺服器地圖？")) {
                db.ref('global_map').remove();
                db.ref('chat').push({ name: "📢 天罰", text: "⚡ 地圖已被創世神強制重置！", color: "#e74c3c" });
                alert("地圖已全部重置！");
            }
        }

        // 5. Ban 人系統
        function banUser() {
            const player = document.getElementById('ban-player').value.trim();
            if(!player) return;
            db.ref('blacklist/' + player).set(true);
            db.ref('chat').push({ name: "🚫 秩序維護", text: `警報！不守規矩的【${player}】已被抓去訓導處進行無限期輔導！`, color: "#e74c3c" });
            alert(`已將 ${player} 列入黑名單！`);
        }
    </script>
</body>
</html>
